# App launcher icons. Masters are baked by `tool/generate_icons.dart` into
# assets/icon/ (the beveled brand tile + white hourglass). Regenerate with:
#   dart run tool/generate_icons.dart && dart run flutter_launcher_icons
#
# Web is omitted (web is disabled, no web/ dir). The bundle id, AndroidManifest
# (android:icon/@mipmap/ic_launcher, android:label) and the flutter_native_splash
# config are intentionally untouched.
flutter_launcher_icons:
  image_path: "assets/icon/icon_master.png" # Android-legacy + fallback

  # iOS — opaque, no alpha (Apple rejects icons with an alpha channel).
  ios: true
  image_path_ios: "assets/icon/icon_master.png"
  remove_alpha_ios: true

  # Android — legacy mipmap (from image_path) + adaptive icon (API 26+).
  android: "ic_launcher"
  min_sdk_android: 21
  adaptive_icon_background: "assets/icon/icon_adaptive_background.png"
  adaptive_icon_foreground: "assets/icon/icon_adaptive_foreground.png"

  # macOS — pre-rounded/pre-margined master (the tool only resizes).
  macos:
    generate: true
    image_path: "assets/icon/icon_macos.png"

  # Windows — multi-resolution .ico overwriting runner/resources/app_icon.ico.
  windows:
    generate: true
    image_path: "assets/icon/icon_master.png"
    icon_size: 256
