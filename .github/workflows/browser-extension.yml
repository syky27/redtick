# Package the Redtick browser extension and publish it to both stores.
# On every extension change, validate the standalone JS files and produce a zip
# with manifest.json at the archive root, attached to the GitHub Release on v*
# tags. On v* tags, when the store secrets are configured, the tag-stamped version
# is also published automatically:
#   - Chrome Web Store (CWS_CLIENT_ID / CWS_CLIENT_SECRET / CWS_REFRESH_TOKEN) —
#     Chrome, Edge, and Brave.
#   - addons.mozilla.org LISTED channel (WEB_EXT_API_KEY / WEB_EXT_API_SECRET) —
#     Firefox.
name: browser-extension

on:
  push:
    branches: ['**']
    tags: ['v*']
    paths:
      - 'extension/**'
      - '.github/workflows/browser-extension.yml'
  pull_request:
    paths:
      - 'extension/**'
      - '.github/workflows/browser-extension.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  WEB_EXT_VERSION: 10.4.0

concurrency:
  group: browser-extension-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Compute artifact suffix
        id: suffix
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            SUFFIX="$GITHUB_REF_NAME"
          else
            SAFE_REF="${GITHUB_REF_NAME//\//-}"
            SUFFIX="${SAFE_REF:-manual}-dev"
          fi
          echo "value=$SUFFIX" >> "$GITHUB_OUTPUT"

      - name: Validate JavaScript
        run: |
          node --check extension/content.js
          node --check extension/options.js
          node --check extension/popup.js

      - name: Validate manifest references
        run: |
          node <<'NODE'
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('extension/manifest.json', 'utf8'));
          const required = [
            'manifest.json',
            'content.js',
            'options.html',
            'options.js',
            'popup.html',
            'popup.js',
            'icons/icon48.png',
            'icons/icon128.png',
          ];
          for (const file of required) {
            if (!fs.existsSync(`extension/${file}`)) {
              throw new Error(`Missing extension file: ${file}`);
            }
          }
          if (manifest.manifest_version !== 3) {
            throw new Error('Expected manifest_version 3');
          }
          if (!manifest.version) {
            throw new Error('manifest.json must define version');
          }
          NODE

      - name: Stage extension files
        shell: bash
        run: |
          set -euo pipefail
          STAGE="build/browser-extension"
          rm -rf "$STAGE" dist
          mkdir -p "$STAGE/icons" dist
          cp extension/manifest.json "$STAGE/"
          cp extension/content.js "$STAGE/"
          cp extension/options.html "$STAGE/"
          cp extension/options.js "$STAGE/"
          cp extension/popup.html "$STAGE/"
          cp extension/popup.js "$STAGE/"
          cp extension/icons/icon48.png "$STAGE/icons/"
          cp extension/icons/icon128.png "$STAGE/icons/"

      - name: Stamp release version into staged manifest
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const manifestPath = 'build/browser-extension/manifest.json';
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          const tag = process.env.RELEASE_TAG || '';
          const raw = tag.replace(/^v/, '');
          const version = raw.replace(/\+/g, '.');
          if (!/^\d+(\.\d+){0,3}$/.test(version)) {
            throw new Error(
              `Release tag ${tag} cannot be used as an extension version. ` +
              'Use v1.2.3 or v1.2.3+4.'
            );
          }
          manifest.version = version;
          fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2) + '\n');
          console.log(`Stamped extension version ${version}`);
          NODE

      - name: Lint staged extension
        run: npx --yes web-ext@${{ env.WEB_EXT_VERSION }} lint --source-dir build/browser-extension

      - name: Package extension zip
        shell: bash
        run: |
          set -euo pipefail
          OUT="redtick-browser-extension-${{ steps.suffix.outputs.value }}.zip"
          cd build/browser-extension
          zip -r "$GITHUB_WORKSPACE/dist/$OUT" .
          cd "$GITHUB_WORKSPACE"
          unzip -Z1 "dist/$OUT" | grep -qx 'manifest.json'
          unzip -l "dist/$OUT"

      - name: Detect AMO signing capability
        id: amo
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        shell: bash
        run: |
          # AMO rejects re-uploading an existing version, and the manifest version
          # is only stamped from the tag on tagged builds — so sign for v* tags only.
          # Branch/PR builds stay zip-only (they'd otherwise re-submit 1.0.0 and 409).
          if [[ "$GITHUB_REF" != refs/tags/* ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Non-tag build — packaging the Chromium zip only (AMO signing runs on v* tags)."
          elif [[ -n "$WEB_EXT_API_KEY" && -n "$WEB_EXT_API_SECRET" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AMO signing secrets absent — producing unsigned browser-extension zip only."
          fi

      - name: Submit Firefox version to AMO (listed / public)
        if: steps.amo.outputs.enabled == 'true'
        # Non-fatal: a listed-submission hiccup (AMO review queue, transient API error)
        # must never drop the Chromium zip from the release. Listed add-ons are
        # distributed by AMO, so no self-hosted XPI is produced or attached.
        continue-on-error: true
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        shell: bash
        run: |
          set -euo pipefail
          # Submit the tag-stamped version to the add-on's LISTED (public) AMO channel.
          # --approval-timeout 0 uploads and returns without blocking on AMO review.
          # AMO requires a license on every listed version, so pass the repo's
          # BSD-3-Clause via --amo-metadata. The listing's summary/categories/
          # screenshots are set up once in the AMO Developer Hub (first submission).
          cat > amo-metadata.json <<'JSON'
          { "version": { "license": "BSD-3-Clause" } }
          JSON
          npx --yes web-ext@${{ env.WEB_EXT_VERSION }} sign \
            --source-dir build/browser-extension \
            --channel=listed \
            --amo-metadata amo-metadata.json \
            --approval-timeout 0

      - name: Detect Chrome Web Store publishing capability
        id: cws
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        shell: bash
        run: |
          # Publish to the Chrome Web Store only on v* tags (the version is stamped
          # from the tag) and only when the OAuth secrets are configured.
          if [[ "$GITHUB_REF" == refs/tags/* && -n "$CWS_CLIENT_ID" && -n "$CWS_CLIENT_SECRET" && -n "$CWS_REFRESH_TOKEN" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Chrome Web Store secrets absent or non-tag build — skipping CWS publish."
          fi

      - name: Upload and publish to the Chrome Web Store
        if: steps.cws.outputs.enabled == 'true'
        # Non-fatal: a CWS API hiccup must never drop the release — the zip is still
        # attached for manual upload.
        continue-on-error: true
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_ITEM_ID: lbmdempbcmkhliblbdbaalojlffcpdka
        shell: bash
        run: |
          set -euo pipefail
          ZIP="$(ls dist/redtick-browser-extension-*.zip | head -1)"
          echo "Uploading $ZIP to Chrome Web Store item $CWS_ITEM_ID"
          TOKEN="$(curl -s https://oauth2.googleapis.com/token \
            -d client_id="$CWS_CLIENT_ID" \
            -d client_secret="$CWS_CLIENT_SECRET" \
            -d refresh_token="$CWS_REFRESH_TOKEN" \
            -d grant_type=refresh_token | jq -r '.access_token // empty')"
          if [[ -z "$TOKEN" ]]; then
            echo "::error::Could not obtain a Chrome Web Store access token."; exit 1
          fi
          UP="$(curl -s -X PUT -T "$ZIP" \
            -H "Authorization: Bearer $TOKEN" -H "x-goog-api-version: 2" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/$CWS_ITEM_ID")"
          echo "$UP"
          if [[ "$(echo "$UP" | jq -r '.uploadState // empty')" != "SUCCESS" ]]; then
            echo "::error::Chrome Web Store upload did not succeed."; exit 1
          fi
          PUB="$(curl -s -X POST -H "Authorization: Bearer $TOKEN" \
            -H "x-goog-api-version: 2" -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$CWS_ITEM_ID/publish")"
          echo "$PUB"
          STATUS="$(echo "$PUB" | jq -r '.status[0] // empty')"
          if [[ "$STATUS" == "OK" || "$STATUS" == "ITEM_PENDING_REVIEW" ]]; then
            echo "Chrome Web Store publish accepted: $STATUS"
          else
            echo "::error::Chrome Web Store publish returned an unexpected status."; exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: redtick-browser-extension
          path: dist/redtick-browser-extension-*.zip
          if-no-files-found: error
          retention-days: 14

  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download extension artifact
        uses: actions/download-artifact@v4
        with:
          name: redtick-browser-extension
          path: dist

      - name: Attach extension artifacts to the draft release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/redtick-browser-extension-*
          draft: true
          fail_on_unmatched_files: true
